<!DOCTYPE html>

<head>

</head>

<body>
    <h1>Hello All ! ! !</h1>
    <input type="button" id="cmd" value="cmd">
    <table id="productRegister" class="display">
        <thead>

</html>
<script>
    var doc = new jsPDF();
    var specialElementHandlers = {
        '#editor': function(element, renderer) {
            return true;
        }
    };

    $('#cmd').click(function() {
        doc.fromHTML($('#productRegister').html(), 15, 15, {
            'width': 170,
            'elementHandlers': specialElementHandlers
        });
        doc.save('sample-file.pdf');
    });
</script>
